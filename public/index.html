<!DOCTYPE html>
<html lang="">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="icon" href="<%= BASE_URL %>favicon.ico">
  <title>
    <%= htmlWebpackPlugin.options.title %>
  </title>
  <!-- Jquery -->
  <script src="https://cdn.staticfile.org/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdn.staticfile.org/vue/2.6.12/vue.min.js"></script>
  <link href="https://cdn.bootcdn.net/ajax/libs/element-ui/2.15.1/theme-chalk/index.min.css" rel="stylesheet">
  <script src="https://cdn.bootcdn.net/ajax/libs/element-ui/2.15.1/index.js"></script>
  <!-- animate.css -->
  <link href="https://cdn.bootcdn.net/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
  <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
  <!-- live2d -->
  <link rel="stylesheet" href="${process.env.BASE_URL}live2d/live2d/css/live2d.css" />
</head>

<body>
  <noscript>
    <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled.
        Please enable it to continue.</strong>
  </noscript>
  <div id="app"></div>
  <div id="landlord">
    <div class="message" style="opacity:0"></div>
    <canvas id="live2d" width="290" height="360" class="live2d"></canvas>
    <div class="hide-button">隐藏</div>
  </div>
  <script async type="text/javascript" src="${process.env.BASE_URL}live2d/live2d/js/live2d.js"></script>
  <script async type="text/javascript" src="${process.env.BASE_URL}live2d/live2d/js/message.js"></script>
  <!-- built files will be auto injected -->
</body>

</html>
